<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goblinwave</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Goblinwave</h1>
        <p class="tagline">Survive the goblins. Collect gold. Dance with confidence.</p>
      </header>

      <aside class="stats-panel" aria-label="Lifetime stats">
        <h2>Records</h2>
        <dl class="records">
          <div>
            <dt>Best wave</dt>
            <dd id="stat-best-wave">0</dd>
          </div>
          <div>
            <dt>Best gold (run)</dt>
            <dd id="stat-best-gold">0</dd>
          </div>
          <div>
            <dt>Total gold</dt>
            <dd id="stat-total-gold">0</dd>
          </div>
          <div>
            <dt>Runs played</dt>
            <dd id="stat-runs">0</dd>
          </div>
        </dl>
      </aside>

      <main class="arena">
        <div class="wave-banner" id="wave-banner">Wave 1</div>

        <div class="combatants">
          <section class="fighter player-panel" aria-label="Player">
            <h2>You</h2>
            <div class="hp-bar" role="progressbar" aria-valuemin="0" aria-valuemax="20" aria-valuenow="20">
              <div class="hp-fill player-hp" id="player-hp-fill"></div>
            </div>
            <p class="hp-text" id="player-hp-text">20 / 20 HP</p>
            <p class="meta">Attack: <span id="player-attack">5</span></p>
            <p class="meta gold-line">Gold: <span id="player-gold">0</span></p>
          </section>

          <section class="fighter goblin-panel" aria-label="Goblin">
            <h2 id="goblin-name">Goblin</h2>
            <figure class="goblin-portrait">
              <img
                id="goblin-image"
                src="assets/goblins/goblin-default.svg"
                alt="Goblin"
                width="200"
                height="200"
              />
            </figure>
            <div class="hp-bar" role="progressbar" aria-valuemin="0" aria-valuemax="12" aria-valuenow="12">
              <div class="hp-fill goblin-hp" id="goblin-hp-fill"></div>
            </div>
            <p class="hp-text" id="goblin-hp-text">12 / 12 HP</p>
          </section>
        </div>

        <p class="turn-label" id="turn-label">Turn 1</p>

        <div class="log" id="log" role="log" aria-live="polite"></div>

        <nav class="actions" id="actions" aria-label="Combat actions">
          <button type="button" data-action="attack" class="btn btn-attack">Attack</button>
          <button type="button" data-action="heal" class="btn btn-heal">Heal</button>
          <button type="button" data-action="dance" class="btn btn-dance">Dance</button>
          <button type="button" data-action="run" class="btn btn-run">Run</button>
        </nav>

        <div class="game-over hidden" id="game-over">
          <h2>Game over</h2>
          <p id="game-over-summary"></p>
          <button type="button" class="btn btn-primary" id="restart-btn">Play again</button>
        </div>
      </main>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
